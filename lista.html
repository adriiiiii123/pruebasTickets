<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTickets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #fcfcfc; font-family: 'Segoe UI', sans-serif; padding: 30px; }
        
        .table thead th {
            background-color: #ffffff;
            border-bottom: 2px solid #dee2e6;
            color: #333;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .table td { vertical-align: middle; font-size: 0.85rem; color: #555; }

        .btn-outline-primary-custom { border: 1px solid #0d6efd; color: #0d6efd; background: white; }
        .btn-outline-primary-custom:hover { background: #0d6efd; color: white; }

        .scroll-box {
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #eee;
            padding: 10px;
            background-color: #fafafa;
        }
        .historico-item { font-size: 0.8rem; border-bottom: 1px solid #f0f0f0; padding: 5px 0; }

        .btn-action { padding: 4px 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container-fluid shadow-sm bg-white p-4 rounded">
    <h3 class="mb-4">iTickets:</h3>
    
    <div class="d-flex justify-content-between mb-3">
        <div style="width: 300px;">
            <input type="text" class="form-control form-control-sm" placeholder="Buscar Ticket">
        </div>
    </div>
    
    <table class="table table-hover border">
        <thead>
            <tr>
                <th>Código</th>
                <th>Vencimiento</th>
                <th>Respuesta</th>
                <th class="text-center">Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>C-001</td>
                <td>15-Abr-2026</td>
                <td id="res-C-001">Esperando confirmación</td>
                <td class="text-center">
                    <button class="btn btn-outline-primary btn-sm btn-action me-1" data-bs-toggle="modal" data-bs-target="#modalEditar" onclick="setTicketActual('C-001')">
                        <i class="fas fa-eye"></i>
                    </button>
                    <button class="btn btn-outline-danger btn-sm btn-action">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </td>
            </tr>
            <tr>
                <td>C-002</td>
                <td>01-May-2026</td>
                <td id="res-C-002">En revisión</td>
                <td class="text-center">
                    <button class="btn btn-outline-primary btn-sm btn-action me-1" data-bs-toggle="modal" data-bs-target="#modalEditar" onclick="setTicketActual('C-002')">
                        <i class="fas fa-eye"></i>
                    </button>
                    <button class="btn btn-outline-danger btn-sm btn-action">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </td>
            </tr>
        </tbody>
    </table>
    
    <div class="text-muted small">Showing 1 to 2 of 2 rows</div>
</div>

<div class="modal fade" id="modalEditar" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold">Detalle del Ticket</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            
            <div class="modal-body">
                <div class="mb-3">
                    <label class="fw-bold small text-muted">Vencimiento</label>
                    <input type="date" class="form-control" id="editVence" style="width: 200px;" value="2026-04-15">
                </div>

                <div class="mb-4">
                    <label class="fw-bold small text-muted">Histórico</label>
                    <div class="scroll-box rounded" id="contenedorHistorico">
                        <div class="historico-item text-muted text-center">Sin mensajes previos.</div>
                    </div>
                </div>

                <hr>

                <h6 class="fw-bold mb-3">Nueva nota</h6>
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="small fw-bold">Responsable</label>
                            <select class="form-select" id="nuevoResp">
                                <option>Juan Pérez</option>
                                <option>María García</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <input type="file" id="inputAdjunto" class="d-none">
                            <button type="button" class="btn btn-light border btn-sm w-100 mb-2 text-start" onclick="document.getElementById('inputAdjunto').click()">
                                <i class="fas fa-paperclip me-2"></i> Añadir Adjuntos
                            </button>
                            
                            <button type="button" class="btn btn-light border btn-sm w-100 text-start" id="btnLink">
                                <i class="fas fa-link me-2"></i> Añadir Link
                            </button>
                            <div id="linkPreview" class="small text-truncate mt-1 text-primary"></div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="small fw-bold">Mensaje</label>
                        <textarea class="form-control" id="nuevoMensaje" rows="5" placeholder="Envía un mensaje..."></textarea>
                    </div>
                </div>

                <div class="mt-3 row align-items-end">
                    <div class="col-md-6">
                        <label class="fw-bold small text-muted d-block">Estatus</label>
                        <select class="form-select form-select-sm" style="width: 150px;">
                            <option>Abierto</option>
                            <option>Cerrado</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light border" data-bs-dismiss="modal">Cerrar</button>
                <button type="button" class="btn btn-primary px-4" id="btnGuardar">Guardar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let linkGuardado = "";
    let ticketSeleccionado = ""; 

    function setTicketActual(codigo) {
        ticketSeleccionado = codigo;
    }

    document.getElementById('btnLink').addEventListener('click', function() {
        const url = prompt("URL del enlace:");
        if(url) {
            linkGuardado = url;
            document.getElementById('linkPreview').innerHTML = `<i class="fas fa-link"></i> ${url}`;
        }
    });

    document.getElementById('btnGuardar').addEventListener('click', function() {
        const mensaje = document.getElementById('nuevoMensaje').value;
        const responsable = document.getElementById('nuevoResp').value;
        const adjunto = document.getElementById('inputAdjunto').files[0];
        const fechaHora = new Date().toLocaleString();

        if(!mensaje) { alert("Escribe un mensaje"); return; }

        const celdaRespuesta = document.getElementById(`res-${ticketSeleccionado}`);
        if(celdaRespuesta) {
            celdaRespuesta.innerText = mensaje;
        }

        const nuevoItem = document.createElement('div');
        nuevoItem.className = 'historico-item';
        
        nuevoItem.innerHTML = `
            <div class="d-flex justify-content-between">
                <span class="fw-bold text-primary">${fechaHora}</span>
                <span class="badge bg-light text-dark border">${responsable}</span>
            </div>
            <div class="mt-1">${mensaje}</div>
            
            ${linkGuardado ? 
                `<div class="mt-1"><a href="${linkGuardado}" target="_blank" class="small text-decoration-none">
                    <i class="fas fa-link"></i> Ver link
                </a></div>` : ''}
            
            ${adjunto ? 
                `<div class="small text-success mt-1">
                    <i class="fas fa-file-upload"></i> ${adjunto.name}
                </div>` : ''}
        `;

        const cont = document.getElementById('contenedorHistorico');
        
        if(cont.innerHTML.includes("Sin mensajes previos.")) { 
            cont.innerHTML = ""; 
        }

        cont.prepend(nuevoItem);

        document.getElementById('nuevoMensaje').value = "";
        document.getElementById('linkPreview').innerHTML = "";
        linkGuardado = "";
        document.getElementById('inputAdjunto').value = "";
        
        const modal = bootstrap.Modal.getInstance(document.getElementById('modalEditar'));
        modal.hide();
    });
</script>

</body>
</html>
